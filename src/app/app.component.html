<main class="min-h-screen bg-black text-white">
  <section class="mx-auto flex min-h-screen w-full max-w-md flex-col overflow-hidden bg-black">
    <header class="border-b border-white/10 px-5 pb-4 pt-5">
      <div class="mb-7 flex items-center justify-between">
        <div class="black-star-mark">
          <img src="assets/icons/blackstar_logo.svg" alt="Black Star" class="h-9 w-9 object-contain"/>
        </div>

        <h1 class="text-[22px] font-light tracking-[0.48em] text-white/90">
          BLACK STAR
        </h1>

        <button class="flex h-9 w-9 items-center justify-center rounded-full text-white/60 transition hover:bg-white/5">
          <img src="assets/icons/bell.svg" alt="Notifications" class="icon-soft h-5 w-5 object-contain" />
        </button>
      </div>

      <nav class="flex items-center justify-between text-sm">
        <button class="relative pb-3 text-white">
          Discover
          <span class="absolute bottom-0 left-0 h-px w-full bg-white"></span>
        </button>

        <button class="pb-3 text-white/40">For You</button>
        <button class="pb-3 text-white/40">Genres</button>
        <button class="pb-3 text-white/40">New Releases</button>
      </nav>
    </header>

    <section class="flex-1 overflow-y-auto pb-36">
      <section class="px-5 py-5">
        <div
          class="relative h-[185px] overflow-hidden rounded-xl border border-white/10 bg-zinc-950"
          [style.backgroundImage]="'linear-gradient(90deg, rgba(0,0,0,.88) 0%, rgba(0,0,0,.55) 42%, rgba(0,0,0,.1) 100%), url(' + currentTrack.cover + ')'"
        >
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>

          <div class="relative z-10 flex h-full flex-col justify-end p-5">
            <p class="mb-3 text-[10px] uppercase tracking-[0.35em] text-white/35">
              Featured
            </p>

            <h2 class="mb-2 text-2xl font-light text-white">
              Night Signals
            </h2>

            <p class="mb-5 max-w-[190px] text-sm leading-5 text-white/65">
              A dark pop journey through the afterhours.
            </p>

            <button
              type="button"
              (click)="selectTrackAndOpenPlayer(currentTrack)"
              class="flex w-fit items-center gap-2 rounded-full border border-white/20 bg-black/30 px-4 py-2 text-sm text-white/90 backdrop-blur-md transition hover:bg-white/10"
            >
              <img
                src="assets/icons/play-button.svg"
                alt="Play"
                class="icon-white h-3.5 w-3.5 object-contain"
              />

              Play Now
            </button>
          </div>
        </div>

        <div class="mt-4 flex justify-center gap-3">
          <span class="h-1.5 w-1.5 rounded-full bg-white"></span>
          <span class="h-1.5 w-1.5 rounded-full bg-white/35"></span>
          <span class="h-1.5 w-1.5 rounded-full bg-white/35"></span>
          <span class="h-1.5 w-1.5 rounded-full bg-white/35"></span>
          <span class="h-1.5 w-1.5 rounded-full bg-white/35"></span>
        </div>
      </section>

      <section class="px-5 pb-6">
        <div class="mb-3 flex items-center justify-between">
          <h3 class="text-base font-light text-white/90">New Releases</h3>
          <button class="text-xs text-white/45">View all</button>
        </div>

        <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
          <button
            type="button"
            *ngFor="let track of tracks"
            (click)="selectTrack(track)"
            class="w-[132px] shrink-0 text-left"
          >
            <div class="mb-2 h-[132px] w-[132px] overflow-hidden rounded-md border border-white/10 bg-zinc-950">
              <img [src]="track.cover" [alt]="track.album" class="h-full w-full object-cover grayscale" />
            </div>

            <h4 class="truncate text-sm font-light text-white/90">
              {{ track.album }}
            </h4>

            <p class="truncate text-xs text-white/45">
              {{ track.artist }}
            </p>
          </button>
        </div>
      </section>

      <section class="px-5 pb-6">
        <div class="mb-3 flex items-center justify-between">
          <h3 class="text-base font-light text-white/90">Curated Playlists</h3>
          <button class="text-xs text-white/45">View all</button>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button
            type="button"
            *ngFor="let playlist of playlists"
            class="flex min-h-[96px] items-center gap-3 rounded-lg border border-white/10 bg-white/[0.03] p-3 text-left transition hover:bg-white/[0.06]"
          >
            <div class="flex-1">
              <h4 class="mb-1 text-sm font-light text-white">
                {{ playlist.title }}
              </h4>

              <p class="line-clamp-2 text-xs leading-4 text-white/45">
                {{ playlist.description }}
              </p>
            </div>

            <img [src]="playlist.image" [alt]="playlist.title" class="h-14 w-14 rounded object-cover grayscale" />
          </button>
        </div>
      </section>

      <section class="px-5 pb-6">
        <div class="mb-3 flex items-center justify-between">
          <h3 class="text-base font-light text-white/90">Recently Played</h3>
          <button class="text-xs text-white/45">View all</button>
        </div>

        <div class="divide-y divide-white/5 border-y border-white/5">
          <button
            type="button"
            *ngFor="let track of tracks"
            (click)="selectTrack(track)"
            class="flex w-full items-center gap-3 py-2.5 text-left transition hover:bg-white/[0.03]"
            [class.bg-white]="track.id === currentTrack.id"
            [class.bg-opacity-5]="track.id === currentTrack.id"
          >
            <img [src]="track.cover" [alt]="track.title" class="h-11 w-11 rounded object-cover grayscale" />

            <div class="min-w-0 flex-1">
              <h4 class="truncate text-sm font-light text-white/90">
                {{ track.title }}
              </h4>

              <p class="truncate text-xs text-white/45">
                {{ track.artist }}
              </p>
            </div>

            <div class="flex items-center gap-2">
              <button
                type="button"
                (click)="toggleTrackPlayback(track, $event)"
                class="track-play-btn"
                [class.is-current]="track.id === currentTrack.id"
                aria-label="Play or pause track"
              >
                <img
                  [src]="track.id === currentTrack.id && isPlaying ? 'assets/icons/pause.svg' : 'assets/icons/play-button.svg'"
                  alt=""
                  class="track-play-icon icon-white"
                />
              </button>

              <button
                type="button"
                (click)="$event.stopPropagation()"
                class="track-menu-btn"
                aria-label="More options"
              >
                <img
                  src="assets/icons/menu.svg"
                  alt=""
                  class="track-menu-icon icon-soft"
                />
              </button>
            </div>
          </button>
        </div>
      </section>
    </section>

    <section
      class="fixed bottom-[64px] left-1/2 z-40 w-full max-w-md -translate-x-1/2 border-t border-white/10 bg-zinc-950/95 px-4 py-3 shadow-[0_-20px_50px_rgba(0,0,0,.8)] backdrop-blur-xl"
      (click)="openPlayer()"
    >
      <div class="flex items-center gap-3">
        <img [src]="currentTrack.cover" [alt]="currentTrack.title" class="h-12 w-12 rounded object-cover grayscale" />

        <div class="min-w-0 flex-1">
          <h4 class="truncate text-sm font-light text-white">
            {{ currentTrack.title }}
          </h4>

          <p class="truncate text-xs text-white/45">
            {{ currentTrack.artist }}
          </p>
        </div>

        <div class="mini-controls">
          <button
            type="button"
            (click)="previousTrack($event)"
            class="mini-control-btn"
            aria-label="Previous track"
          >
            <img
              src="assets/icons/skip-previous.svg"
              alt=""
              class="icon-white mini-control-icon"
            />
          </button>

          <button
            type="button"
            (click)="togglePlay($event)"
            class="mini-play-btn"
            aria-label="Play or pause"
          >
            <img
              [src]="isPlaying ? 'assets/icons/pause.svg' : 'assets/icons/play-button.svg'"
              alt=""
              class="icon-white mini-play-icon"
            />
          </button>

          <button
            type="button"
            (click)="nextTrack($event)"
            class="mini-control-btn"
            aria-label="Next track"
          >
            <img
              src="assets/icons/next.svg"
              alt=""
              class="icon-white mini-control-icon"
            />
          </button>
        </div>
      </div>
    </section>

    <nav class="fixed bottom-0 left-1/2 z-40 grid h-16 w-full max-w-md -translate-x-1/2 grid-cols-4 border-t border-white/10 bg-black/95 backdrop-blur-xl">
      <button class="flex flex-col items-center justify-center gap-1 text-white">
        <img src="assets/icons/home.svg" alt="Home" class="icon-active h-5 w-5 object-contain" />
        <span class="text-[10px]">Home</span>
      </button>

      <button class="flex flex-col items-center justify-center gap-1 text-white/45">
        <img src="assets/icons/search.svg" alt="Search" class="icon-soft h-5 w-5 object-contain" />
        <span class="text-[10px]">Search</span>
      </button>

      <button class="flex flex-col items-center justify-center gap-1 text-white/45">
        <img src="assets/icons/library.svg" alt="Library" class="icon-soft h-5 w-5 object-contain" />
        <span class="text-[10px]">Library</span>
      </button>

      <button class="flex flex-col items-center justify-center gap-1 text-white/45">
        <img src="assets/icons/icon-profile.svg" alt="Profile" class="icon-soft h-5 w-5 object-contain" />
        <span class="text-[10px]">Profile</span>
      </button>
    </nav>
  </section>

  <section
    *ngIf="isPlayerOpen"
    class="player-overlay"
    [class.is-closing]="isPlayerClosing"
  >
    <div class="player-sheet">
      <header class="flex items-center justify-between px-5 py-5">
      <button
        type="button"
        (click)="closePlayer()"
        class="flex h-10 w-10 items-center justify-center rounded-full text-2xl text-white/70 transition hover:bg-white/5"
      >
        <img src="assets/icons/down-arrow.svg" alt="Close player" class="icon-soft h-5 w-5 object-contain">
      </button>

      <div class="black-star-mark">
        <img src="assets/icons/blackstar_logo.svg" alt="Black Star" class="h-9 w-9 object-contain"/>
      </div>

      <button class="flex h-10 w-10 items-center justify-center rounded-full text-2xl text-white/70 transition hover:bg-white/5">
        <img src="assets/icons/menu.svg" alt="More options" class="icon-soft h-5 w-5 object-contain"/>
      </button>
      </header>

      <section class="flex-1 overflow-y-auto px-4 pb-8">
        <div class="turntable mx-auto mt-2">
          <div
            class="record"
            [class.is-playing]="isPlaying"
            [style.--cover-image]="'url(' + currentTrack.cover + ')'"
          >
            <div class="record-label"></div>
            <div class="record-hole"></div>
          </div>

          <div class="tonearm" [class.is-playing]="isPlaying">
            <div class="tonearm-base"></div>
            <div class="tonearm-line"></div>
            <div class="tonearm-head"></div>
          </div>

          <div class="turntable-button button-one"></div>
          <div class="turntable-button button-two"></div>
        </div>

      <section class="px-2 pt-8">
        <div class="mb-6 flex items-start justify-between gap-4">
          <div>
            <h2 class="text-[28px] font-light leading-tight text-white">
              {{ currentTrack.title }}
            </h2>

            <p class="mt-1 text-base text-white/55">
              {{ currentTrack.artist }}
            </p>
          </div>

          <div class="flex gap-3 pt-2">
            <button type="button" (click)="toggleLike()" class="text-3xl leading-none text-white/80">
              <img
                [src]="isLiked ? 'assets/icons/star_filled.svg' : 'assets/icons/star.svg'"
                [alt]="isLiked ? 'Liked' : 'Not liked'"
                class="icon-active h-5 w-5 object-contain"
              />
            </button>
            <button class="text-2xl leading-none text-white/70">
              <img src="assets/icons/dots.svg" alt="More options" class="icon-soft h-5 w-5 object-contain"/>
            </button>
          </div>
        </div>

        <div class="mb-2 h-1 rounded-full bg-white/15">
          <div class="relative h-full w-[42%] rounded-full bg-white">
            <span class="absolute right-0 top-1/2 h-3 w-3 -translate-y-1/2 translate-x-1/2 rounded-full bg-white"></span>
          </div>
        </div>

        <div class="mb-3 flex justify-between text-xs text-white/45">
          <span>1:32</span>
          <span>{{ currentTrack.duration }}</span>
        </div>

        <div class="mx-auto mb-8 w-fit rounded-md bg-white/10 px-3 py-1 text-xs tracking-wide text-white/45">
          HI-FI · 24-BIT
        </div>

        <div class="main-controls mb-8">
          <button class="main-side-btn" aria-label="Shuffle">
            <img
              src="assets/icons/mix.svg"
              alt=""
              class="icon-soft h-5 w-5 object-contain"
            />
          </button>

          <button
            type="button"
            (click)="previousTrack($event)"
            class="main-skip-btn"
            aria-label="Previous track"
          >
            <img
              src="assets/icons/skip-previous.svg"
              alt=""
              class="icon-white main-skip-icon"
            />
          </button>

          <button
            type="button"
            (click)="togglePlay($event)"
            class="main-play-btn"
            aria-label="Play or pause"
          >
            <img
              [src]="isPlaying ? 'assets/icons/pause.svg' : 'assets/icons/play-button.svg'"
              alt=""
              class="icon-white main-play-icon"
            />
          </button>

          <button
            type="button"
            (click)="nextTrack($event)"
            class="main-skip-btn"
            aria-label="Next track"
          >
            <img
              src="assets/icons/next.svg"
              alt=""
              class="icon-white main-skip-icon"
            />
          </button>

          <button class="main-side-btn" aria-label="Repeat">
            <img
              src="assets/icons/loop.svg"
              alt=""
              class="icon-soft h-5 w-5 object-contain"
            />
          </button>
        </div>

        <section class="rounded-t-3xl border border-white/10 bg-white/[0.04] px-4 py-5">
          <div class="mb-5 grid grid-cols-2 text-center text-sm">
            <button class="relative pb-3 text-white">
              Queue
              <span class="absolute bottom-0 left-1/2 h-px w-10 -translate-x-1/2 bg-white"></span>
            </button>

            <button class="pb-3 text-white/40">
              Lyrics
            </button>
          </div>

          <div class="space-y-2">
            <button
              type="button"
              *ngFor="let track of tracks; index as i"
              (click)="selectTrack(track)"
              class="flex w-full items-center gap-3 rounded-xl p-2 text-left transition hover:bg-white/[0.05]"
              [class.bg-white]="track.id === currentTrack.id"
              [class.bg-opacity-5]="track.id === currentTrack.id"
            >
              <span class="w-5 text-sm text-white/50">
                {{ i + 1 }}
              </span>

              <img [src]="track.cover" [alt]="track.title" class="h-12 w-12 rounded object-cover grayscale" />

              <div class="min-w-0 flex-1">
                <h4 class="truncate text-sm font-light text-white">
                  {{ track.title }}
                </h4>

                <p class="truncate text-xs text-white/45">
                  {{ track.artist }}
                </p>
              </div>

              <span class="flex h-8 w-8 items-center justify-center">
                <span *ngIf="track.id === currentTrack.id" class="equalizer" [class.is-playing]="isPlaying" aria-label="Now playing">
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
                <img *ngIf="track.id !== currentTrack.id" src="assets/icons/menu.svg" alt="More options" class="icon-soft h-5 w-5 object-contain"/>
              </span>
            </button>
          </div>
        </section>
      </section>
      </section>
    </div>
  </section>
</main>
