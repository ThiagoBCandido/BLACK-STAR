<section class="mx-auto flex min-h-screen w-full max-w-md flex-col overflow-hidden bg-black pb-36">
  <header class="border-b border-white/10 px-5 pb-5 pt-5">
    <div class="mb-7 grid grid-cols-[42px_1fr_auto] items-center gap-3">
      <img
        src="assets/icons/blackstar_logo.svg"
        alt="Black Star"
        class="main-logo main-logo-glow"
      />

      <h1 class="text-center text-[22px] font-light tracking-[0.48em] text-white/90">
        LIBRARY
      </h1>

      <button
        type="button"
        class="flex h-9 items-center gap-2 rounded-full border border-white/10 bg-white/[0.04] px-3 text-[11px] font-light text-white/75 transition hover:bg-white/[0.08]"
        aria-label="Create playlist"
        title="Coming soon"
      >
        <img
          src="assets/icons/add.svg"
          alt=""
          class="icon-soft h-3.5 w-3.5 object-contain"
        />

        <span>Playlist</span>
      </button>
    </div>

    <div>
      <p class="text-[10px] uppercase tracking-[0.35em] text-white/30">
        Spotify
      </p>

      <h2 class="mt-1 text-xl font-light text-white">
        Your Playlists
      </h2>
    </div>
  </header>

  <section class="flex-1 overflow-y-auto px-5 py-5">
    <div *ngIf="player.libraryError()" class="mb-4 rounded-2xl border border-white/10 bg-white/[0.04] p-4 text-sm text-white/60">
      {{ player.libraryError() }}
    </div>

    <div *ngIf="player.isLoadingLibrary()" class="py-12 text-center text-sm text-white/45">
      Loading playlists...
    </div>

    <div *ngIf="!player.isLoadingLibrary() && !player.libraryPlaylists().length" class="empty-state">
      <p class="text-[10px] uppercase tracking-[0.35em] text-white/30">
        No playlists
      </p>

      <h2 class="mt-3 text-2xl font-light text-white">
        Nothing here yet
      </h2>

      <p class="mt-3 max-w-[260px] text-sm leading-6 text-white/45">
        Connect Spotify and refresh your library to load your playlists.
      </p>
    </div>

    <div *ngIf="!player.isLoadingLibrary() && player.libraryPlaylists().length" class="space-y-3">
      <button type="button" *ngFor="let playlist of player.libraryPlaylists()" (click)="player.selectPlaylist(playlist)" class="flex w-full items-center gap-4 rounded-2xl border border-white/10 bg-white/[0.03] p-3 text-left transition hover:border-white/20 hover:bg-white/[0.06]">
        <div class="h-16 w-16 shrink-0 overflow-hidden rounded-xl bg-white/10">
          <img *ngIf="playlist.image" [src]="playlist.image" [alt]="playlist.title" class="h-full w-full object-cover grayscale" />
        </div>

        <div class="min-w-0 flex-1">
          <h3 class="truncate text-sm font-light text-white">
            {{ playlist.title }}
          </h3>

          <p class="truncate text-xs text-white/45">
            {{ playlist.owner }} &middot; {{ playlist.totalTracks || 0 }} tracks
          </p>

          <p class="mt-1 line-clamp-1 text-xs text-white/30">
            {{ playlist.isAccessible ? playlist.description : 'Restricted by Spotify API' }}
          </p>
        </div>

        <img src="assets/icons/dots.svg" alt="" class="icon-soft h-5 w-5 object-contain" />
      </button>
    </div>
  </section>
</section>
