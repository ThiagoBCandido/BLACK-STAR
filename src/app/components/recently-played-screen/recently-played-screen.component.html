<section class="mx-auto flex min-h-screen w-full max-w-md flex-col overflow-hidden bg-black pb-36">
  <app-screen-header title="RECENT" eyebrow="Spotify" heading="Recently Played" description="Your latest unique tracks. Repeated songs move back to the top." [showBackButton]="true" (back)="navigation.goHome()" actionIcon="assets/icons/reload.svg" actionTitle="Refresh recently played" (action)="player.loadSpotifyTracks()"></app-screen-header>
  <section class="flex-1 overflow-y-auto px-5 py-5">
    <app-track-list-skeleton *ngIf="player.isLoadingSpotifyTracks()" [items]="8"></app-track-list-skeleton>
    <div *ngIf="!player.isLoadingSpotifyTracks() && !player.tracks().length" class="empty-state">
      <p class="text-[10px] uppercase tracking-[0.35em] text-white/30">
        Empty
      </p>
      <h2 class="mt-3 text-2xl font-light text-white">
        No recent tracks
      </h2>
      <p class="mt-3 max-w-[260px] text-sm leading-6 text-white/45">
        Play something on Spotify and refresh this screen.
      </p>
    </div>
    <div *ngIf="!player.isLoadingSpotifyTracks() && player.tracks().length" class="space-y-2">
      <app-track-list-item *ngFor="let track of player.tracks()" [track]="track" [showAlbum]="true"></app-track-list-item>
    </div>
  </section>
</section>
