<section class="mx-auto flex min-h-screen w-full max-w-md flex-col overflow-hidden bg-black pb-36">
  <app-screen-header title="RECENT" eyebrow="Spotify" heading="Recently Played" description="Your latest unique tracks. Repeated songs move back to the top." [showBackButton]="true" (back)="navigation.goLibrary()" actionIcon="assets/icons/loop.svg" actionTitle="Refresh recently played" (action)="browse.loadRecentlyPlayedTracks()"></app-screen-header>
  <section class="flex-1 overflow-y-auto px-5 py-5">
    <section *ngIf="!browse.isLoadingRecentlyPlayed() && browse.recentlyPlayedTracks().length" class="collection-hero">
      <div>
        <p class="text-[10px] uppercase tracking-[0.35em] text-white/30">
          Collection
        </p>
        <h2 class="mt-2 text-2xl font-light text-white">
          Recently Played
        </h2>
        <p class="mt-2 text-sm leading-6 text-white/45">
          {{ browse.recentlyPlayedTracks().length }} tracks loaded from your Spotify history.
        </p>
      </div>
      <button type="button" (click)="playRecentlyPlayed()" class="collection-play-btn">
        <img src="assets/icons/play-button.svg" alt=""/>
        <span>Play</span>
      </button>
    </section>
    <app-track-list-skeleton *ngIf="browse.isLoadingRecentlyPlayed()" [items]="8"></app-track-list-skeleton>
    <div *ngIf="!browse.isLoadingRecentlyPlayed() && !browse.recentlyPlayedTracks().length" class="empty-state">
      <p class="text-[10px] uppercase tracking-[0.35em] text-white/30">
        Empty
      </p>
      <h2 class="mt-3 text-2xl font-light text-white">
        No recent tracks
      </h2>
      <p class="mt-3 max-w-[260px] text-sm leading-6 text-white/45">
        Play something on Spotify and refresh this screen.
      </p>
    </div>
    <div *ngIf="!browse.isLoadingRecentlyPlayed() && browse.recentlyPlayedTracks().length" class="space-y-2">
      <app-track-list-item *ngFor="let track of browse.recentlyPlayedTracks()" [track]="track" [showAlbum]="true" [queueContext]="browse.recentlyPlayedTracks()" queueName="Recently Played"></app-track-list-item>
    </div>
  </section>
</section>
