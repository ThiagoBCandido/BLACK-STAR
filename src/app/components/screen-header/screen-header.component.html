<header class="border-b border-white/10 px-5 pb-5 pt-5">
  <div class="flex items-center justify-between">
    <button *ngIf="showBackButton; else emptyLeading" type="button" (click)="back.emit()" class="flex h-10 w-10 items-center justify-center rounded-full bg-white/[0.04] transition hover:bg-white/[0.08]" aria-label="Back">
      <img src="assets/icons/return.svg" alt="" class="icon-soft h-5 w-5 object-contain"/>
    </button>
    <ng-template #emptyLeading>
      <div class="h-10 w-10"></div>
    </ng-template>
    <img *ngIf="showLogo" src="assets/icons/blackstar_logo.svg" alt="Black Star" class="main-logo"/>
    <div *ngIf="!showLogo" class="h-10 w-10"></div>
    <button *ngIf="actionLabel || actionIcon; else emptyAction" type="button" (click)="action.emit()" class="flex h-9 items-center gap-2 rounded-full border border-white/10 bg-white/[0.04] px-3 text-[11px] font-light text-white/75 transition hover:bg-white/[0.08]" [attr.title]="actionTitle">
      <img *ngIf="actionIcon" [src]="actionIcon" alt="" class="icon-soft h-3.5 w-3.5 object-contain"/>
      <span *ngIf="actionLabel">
        {{ actionLabel }}
      </span>
    </button>
    <ng-template #emptyAction>
      <div class="h-10 w-10"></div>
    </ng-template>
  </div>
  <ng-content></ng-content>
</header>
