<header class="px-5 pb-4 pt-5">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0 flex-1">
      <div class="flex items-center gap-3" *ngIf="showBackButton">
        <button type="button" (click)="back.emit()" class="flex h-9 w-9 items-center justify-center rounded-full border border-white/10 bg-white/[0.03]" aria-label="Back">
          <img src="assets/icons/return.svg" alt="" class="icon-soft h-4 w-4 object-contain"/>
        </button>
      </div>

      <h1 class="mt-2 text-2xl font-light text-white">
        {{ heading }}
      </h1>

      <p *ngIf="description" class="mt-2 max-w-[280px] text-sm leading-6 text-white/45">
        {{ description }}
      </p>
    </div>

    <button *ngIf="actionLabel || actionIcon" type="button" (click)="action.emit()" class="flex h-10 min-w-10 items-center justify-center rounded-full border border-white/10 bg-white/[0.04] px-3 text-xs text-white/65 transition hover:bg-white/[0.08] hover:text-white" [attr.title]="actionTitle">
      <img *ngIf="actionIcon" [src]="actionIcon" alt="" class="icon-soft h-4 w-4 object-contain"/>
      <span *ngIf="actionLabel" class="ml-2">{{ actionLabel }}</span>
    </button>
  </div>

  <ng-content></ng-content>
</header>
