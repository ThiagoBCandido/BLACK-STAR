<div class="space-y-2">

    <div class="skeleton h-14 w-14 shrink-0 rounded"></div>
    <div class="min-w-0 flex-1 space-y-2">
      <div class="skeleton h-3 w-3/4 rounded-full"></div>
      <div class="skeleton h-2.5 w-1/2 rounded-full"></div>
    </div>
    <div class="skeleton h-9 w-9 shrink-0 rounded-full"></div>
    <div class="skeleton h-9 w-9 shrink-0 rounded-full"></div>
  </div>
</div>
