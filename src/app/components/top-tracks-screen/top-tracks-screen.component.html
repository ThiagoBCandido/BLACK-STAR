<section class="app-screen-gradient mx-auto flex min-h-screen w-full max-w-md flex-col overflow-hidden pb-36">
  <app-screen-header title="TOP TRACKS" eyebrow="Spotify" heading="Your Top Tracks" description="Tracks based on your recent Spotify listening history." [showBackButton]="true" (back)="navigation.goLibrary()" actionIcon="assets/icons/loop.svg" actionTitle="Refresh top tracks" (action)="browse.loadTopTracks()"></app-screen-header>
  <section class="flex-1 overflow-y-auto px-5 py-5">
    <section *ngIf="!browse.isLoadingTopTracks() && browse.topTracks().length" class="collection-hero">
      <div>
        <p class="text-[10px] uppercase tracking-[0.35em] text-white/30">
          Collection
        </p>
        <h2 class="mt-2 text-2xl font-light text-white">
          Top Tracks
        </h2>
        <p class="mt-2 text-sm leading-6 text-white/45">
          {{ browse.topTracks().length }} tracks loaded from your Spotify profile.
        </p>
      </div>
      <button type="button" (click)="playTopTracks()" class="collection-play-btn">
        <img src="assets/icons/play-button.svg" alt=""/>
        <span>Play</span>
      </button>
    </section>
    <app-track-list-skeleton *ngIf="browse.isLoadingTopTracks()" [items]="8"></app-track-list-skeleton>
    <div *ngIf="!browse.isLoadingTopTracks() && !browse.topTracks().length" class="app-empty-state">
      <p class="text-[10px] uppercase tracking-[0.35em] text-white/30">
        Empty
      </p>
      <h2 class="mt-3 text-2xl font-light text-white">
        No top tracks yet
      </h2>
      <p class="mt-3 max-w-[260px] text-sm leading-6 text-white/45">
        Listen to more music on Spotify and refresh this screen.
      </p>
    </div>
    <div *ngIf="!browse.isLoadingTopTracks() && browse.topTracks().length" class="space-y-2">
      <app-track-list-item *ngFor="let track of browse.topTracks()" [track]="track" [showAlbum]="true" [queueContext]="browse.topTracks()" queueName="Top Tracks"></app-track-list-item>
    </div>
  </section>
</section>
