<section class="mx-auto flex min-h-screen w-full max-w-md flex-col overflow-hidden bg-black pb-36">
  <header class="border-b border-white/10 px-5 pb-4 pt-5">
    <div class="flex items-center justify-between gap-4">
      <button type="button" (click)="navigation.goProfile()" class="flex min-w-0 items-center gap-3 text-left">
        <span class="flex h-11 w-11 shrink-0 items-center justify-center overflow-hidden rounded-full border border-white/10 bg-white/[0.04]">
          <img *ngIf="profileImage(); else profileFallback" [src]="profileImage()" [alt]="profileName()" class="h-full w-full object-cover"/>
          <ng-template #profileFallback>
            <img src="assets/icons/icon-profile.svg" alt="" class="h-full w-full object-cover opacity-70"/>
          </ng-template>
        </span>
        <span class="min-w-0">
          <span class="block text-[10px] uppercase tracking-[0.32em] text-white/35">
            BLACK STAR!
          </span>
          <span class="mt-1 block max-w-[150px] truncate text-sm font-light text-white/75">
            {{ profileName() }}
          </span>
        </span>
      </button>
      <button type="button" (click)="handleConnectionAction()" class="shrink-0 rounded-full border border-white/10 bg-white/[0.04] px-3 py-2 text-[11px] font-light text-white/70 transition hover:bg-white/[0.08]">
        {{ connectionLabel() }}
      </button>
    </div>
  </header>

  <section class="flex-1 overflow-y-auto">
    <section class="px-5 pb-5 pt-4">
      <div class="mb-3 flex items-center justify-between">
        <h3 class="text-base font-light text-white/90">
          Your Playlists
        </h3>
        <button type="button" (click)="navigation.goLibrary()" class="text-xs text-white/45 transition hover:text-white">
          View all
        </button>
      </div>

      <button *ngIf="!isMusicSourceReady()" type="button" (click)="spotifyAuth.login()" class="w-full rounded-xl border border-white/10 bg-white/[0.03] p-3 text-left transition hover:bg-white/[0.06]">
        <h4 class="text-sm font-light text-white">
          Connect Spotify
        </h4>
        <p class="mt-1 text-xs leading-5 text-white/45">
          Connect your account to show your real playlists here.
        </p>
      </button>

      <div *ngIf="isMusicSourceReady() && (library.isLoadingLibrary() || !hasRequestedPlaylists())" class="rounded-xl border border-white/10 bg-white/[0.03] p-3 text-sm text-white/45">
        Loading your playlists...
      </div>

      <div *ngIf="isMusicSourceReady() && !library.isLoadingLibrary() && library.libraryError()" class="rounded-xl border border-white/10 bg-white/[0.03] p-3">
        <h4 class="text-sm font-light text-white">
          Could not load your playlists
        </h4>
        <p class="mt-1 text-xs leading-5 text-white/45">
          {{ library.libraryError() }}
        </p>
        <button type="button" (click)="loadHomePlaylists()" class="mt-3 rounded-full border border-white/10 px-3 py-1.5 text-xs text-white/60 transition hover:bg-white/[0.06] hover:text-white">
          Try again
        </button>
      </div>

      <div *ngIf="isMusicSourceReady() && hasRequestedPlaylists() && !library.isLoadingLibrary() && !library.libraryError() && !homePlaylists().length" class="rounded-xl border border-white/10 bg-white/[0.03] p-3">
        <h4 class="text-sm font-light text-white">
          No playlists found
        </h4>
        <p class="mt-1 text-xs leading-5 text-white/45">
          Your playlists will appear here.
        </p>
      </div>

      <div *ngIf="isMusicSourceReady() && hasRequestedPlaylists() && !library.isLoadingLibrary() && !library.libraryError() && homePlaylists().length" class="grid grid-cols-2 gap-2">
        <button type="button" *ngFor="let playlist of homePlaylists()" (click)="openPlaylist(playlist)" [disabled]="playlist.isAccessible === false" class="playlist-card">
          <div class="playlist-cover">
            <img [src]="playlist.image || 'assets/icons/blackstarpng.png'" [alt]="playlist.title"/>
          </div>
          <div class="min-w-0 flex-1">
            <h4 class="truncate text-xs font-light text-white">
              {{ playlist.title }}
            </h4>
            <p class="mt-0.5 truncate text-[11px] text-white/40">
              {{ playlist.owner || playlist.description || 'Spotify playlist' }}
            </p>
            <p class="mt-1 text-[9px] uppercase tracking-[0.14em] text-white/25">
              {{ playlist.totalTracks || 0 }} tracks
            </p>
          </div>
        </button>
      </div>
    </section>

    <section class="px-5 pb-5">
      <article class="featured-card">
        <img [src]="featuredTrack().cover" [alt]="featuredTrack().title" class="featured-bg"/>

        <div class="featured-overlay"></div>

        <div class="featured-content">
          <div class="featured-info">
            <p class="featured-eyebrow">
              Featured Release
            </p>

            <h2>
              {{ featuredTrack().title }}
            </h2>

            <p class="featured-artist">
              {{ featuredTrack().artist }}
            </p>

            <p class="featured-description">
              {{ featuredDescription() }}
            </p>

            <button type="button" (click)="player.selectTrack(featuredTrack())" class="featured-play-btn">
              <img src="assets/icons/play-button.svg" alt=""/>
              <span>Play Now</span>
            </button>
          </div>

          <button type="button" (click)="player.selectTrack(featuredTrack())" class="featured-cover">
            <img [src]="featuredTrack().cover" [alt]="featuredTrack().title"/>
          </button>
        </div>
      </article>

      <div *ngIf="featuredTracks().length > 1" class="featured-dots">
        <button type="button" *ngFor="let track of featuredTracks(); let index = index" (click)="selectFeaturedTrack(index)" [class.is-active]="selectedFeaturedIndex() === index" [attr.aria-label]="'Show featured track ' + (index + 1)"></button>
      </div>
    </section>

    <section class="px-5 pb-6">
      <div class="mb-3 flex items-center justify-between">
        <h3 class="text-base font-light text-white/90">
          New Releases
        </h3>
        <button type="button" (click)="navigation.goTopTracks()" class="text-xs text-white/45 transition hover:text-white">
          View all
        </button>
      </div>
      <div class="scrollbar-hide flex gap-3 overflow-x-auto pb-2">
        <button type="button" *ngFor="let track of browse.topTracks().length ? browse.topTracks() : browse.recentlyPlayedTracks()" (click)="player.selectTrack(track)" class="w-[132px] shrink-0 text-left">
          <div class="mb-2 h-[132px] w-[132px] overflow-hidden rounded-md border border-white/10 bg-zinc-950">
            <img [src]="track.cover" [alt]="track.album" class="h-full w-full object-cover"/>
          </div>
          <h4 class="truncate text-sm font-light text-white/90">
            {{ track.album }}
          </h4>
          <p class="truncate text-xs text-white/45">
            {{ track.artist }}
          </p>
        </button>
      </div>
    </section>

    <section class="px-5 pb-6">
      <div class="mb-3 flex items-center justify-between">
        <h3 class="text-base font-light text-white/90">
          Recently Played
        </h3>
        <button type="button" (click)="navigation.goRecentlyPlayed()" class="text-xs text-white/45 transition hover:text-white">
          View all
        </button>
      </div>
      <div class="space-y-1 border-y border-white/10 py-1">
        <app-track-list-skeleton *ngIf="browse.isLoadingRecentlyPlayed()" [items]="4"></app-track-list-skeleton>
        <ng-container *ngIf="!browse.isLoadingRecentlyPlayed()">
          <app-track-list-item *ngFor="let track of recentTracks()" [track]="track" size="compact"></app-track-list-item>
        </ng-container>
      </div>
    </section>
  </section>
</section>
