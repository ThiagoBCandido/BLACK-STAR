<section class="mx-auto flex min-h-screen w-full max-w-md flex-col overflow-hidden bg-black pb-36">
  <header class="border-b border-white/10 px-5 pb-4 pt-5">
    <div class="mb-7 flex items-center justify-between">
      <img src="assets/icons/blackstar_logo.svg" alt="Black Star" class="main-logo"/>
      <h1 class="text-[22px] font-light tracking-[0.48em] text-white/90">
        BLACK STAR
      </h1>
      <button type="button" (click)="spotifyAuth.isAuthenticated() ? spotifyAuth.logout() : spotifyAuth.login()" class="rounded-full border border-white/10 bg-white/[0.04] px-3 py-2 text-[11px] font-light text-white/70 transition hover:bg-white/[0.08]">
        {{ spotifyAuth.isAuthenticated() ? 'Connected' : 'Spotify' }}
      </button>
    </div>
    <nav class="flex items-center justify-between text-sm">
      <button class="relative pb-3 text-white">
        Discover
        <span class="absolute bottom-0 left-0 h-px w-full bg-white">
        </span>
      </button>
      <button class="pb-3 text-white/40">
        For You
      </button>
      <button class="pb-3 text-white/40">
        Genres
      </button>
      <button class="pb-3 text-white/40">
        New Releases
      </button>
    </nav>
  </header>
  <section class="flex-1 overflow-y-auto">
    <section class="px-5 pt-4">
      <article class="relative overflow-hidden rounded-3xl border border-white/10">
        <img [src]="player.featuredTrack().cover" [alt]="player.featuredTrack().title" class="absolute inset-0 h-full w-full scale-110 object-cover opacity-35 blur-2xl"/>
        <div class="absolute inset-0 bg-black/65"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/60 to-black/25"></div>
        <div class="relative flex min-h-[150px] items-center justify-between gap-4 p-4">
          <div class="min-w-0 flex-1">
            <p class="mb-2 text-[10px] uppercase tracking-[0.35em] text-white/35">
              Featured Release
            </p>
            <h2 class="truncate text-[28px] font-light leading-none text-white">
              {{ player.featuredTrack().title }}
            </h2>
            <p class="mt-2 truncate text-sm text-white/60">
              {{ player.featuredTrack().artist }}
            </p>
            <p class="mt-3 line-clamp-2 max-w-[190px] text-sm leading-5 text-white/70">
              {{ player.featuredDescription() }}
            </p>
            <button type="button" (click)="player.selectTrack(player.featuredTrack())" class="mt-4 inline-flex h-10 items-center gap-2 rounded-full bg-white px-4 text-sm font-medium text-black transition hover:scale-[1.02]">
              <img src="assets/icons/play-button.svg" alt="" class="h-3.5 w-3.5 object-contain"/>
              <span>Play Now</span>
            </button>
          </div>
          <div class="h-28 w-28 shrink-0 overflow-hidden rounded-xl border border-white/10 bg-white/5 shadow-[0_12px_28px_rgba(0,0,0,0.35)]">
            <img [src]="player.featuredTrack().cover" [alt]="player.featuredTrack().title" class="h-full w-full object-cover grayscale"/>
          </div>
        </div>
      </article>
      <div class="mt-3 flex items-center justify-center gap-2">
        <span class="h-1.5 w-1.5 rounded-full bg-white"></span>
        <span class="h-1.5 w-1.5 rounded-full bg-white/25"></span>
        <span class="h-1.5 w-1.5 rounded-full bg-white/25"></span>
        <span class="h-1.5 w-1.5 rounded-full bg-white/25"></span>
      </div>
    </section>
    <section class="px-5 pb-6">
      <div class="mb-3 flex items-center justify-between">
        <h3 class="text-base font-light text-white/90">
          New Releases
        </h3>
        <button type="button" (click)="player.setActiveScreen('topTracks')" class="text-xs text-white/45 transition hover:text-white">
          View all
        </button>
      </div>
      <div class="scrollbar-hide flex gap-3 overflow-x-auto pb-2">
        <button type="button" *ngFor="let track of player.topTracks().length ? player.topTracks() : player.tracks()" (click)="player.selectTrack(track)" class="w-[132px] shrink-0 text-left">
          <div class="mb-2 h-[132px] w-[132px] overflow-hidden rounded-md border border-white/10 bg-zinc-950">
            <img [src]="track.cover" [alt]="track.album" class="h-full w-full object-cover grayscale"/>
          </div>
          <h4 class="truncate text-sm font-light text-white/90">
            {{ track.album }}
          </h4>
          <p class="truncate text-xs text-white/45">
            {{ track.artist }}
          </p>
        </button>
      </div>
    </section>
    <section class="px-5 pb-6">
      <div class="mb-3 flex items-center justify-between">
        <h3 class="text-base font-light text-white/90">
          Curated Playlists
        </h3>
        <button class="text-xs text-white/45">
          View all
        </button>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <button type="button" *ngFor="let playlist of player.playlists()" class="flex min-h-[96px] items-center gap-3 rounded-lg border border-white/10 bg-white/[0.03] p-3 text-left transition hover:bg-white/[0.06]">
          <div class="flex-1">
            <h4 class="mb-1 text-sm font-light text-white">
              {{ playlist.title }}
            </h4>
            <p class="line-clamp-2 text-xs leading-4 text-white/45">
              {{ playlist.description }}
            </p>
          </div>
          <img [src]="playlist.image" [alt]="playlist.title" class="h-14 w-14 rounded object-cover grayscale"/>
        </button>
      </div>
    </section>
    <section class="px-5 pb-6">
      <div class="mb-3 flex items-center justify-between">
        <h3 class="text-base font-light text-white/90">
          Recently Played
        </h3>
        <button type="button" (click)="player.setActiveScreen('recentlyPlayed')" class="text-xs text-white/45 transition hover:text-white">
          View all
        </button>
      </div>
      <div class="space-y-1 border-y border-white/10 py-1">
        <app-track-list-skeleton *ngIf="player.isLoadingSpotifyTracks()" [items]="4"></app-track-list-skeleton>
        <ng-container *ngIf="!player.isLoadingSpotifyTracks()">
          <app-track-list-item *ngFor="let track of player.tracks()" [track]="track" size="compact"></app-track-list-item>
        </ng-container>
      </div>
    </section>
  </section>
</section>
