<section class="player-overlay" [class.is-closing]="player.isPlayerClosing()">
  <div class="player-sheet">
    <header class="flex items-center justify-between px-5 py-5">
      <button type="button" (click)="player.closePlayer()" class="flex h-10 w-10 items-center justify-center rounded-full transition hover:bg-white/5" aria-label="Close player">
        <img src="assets/icons/down-arrow.svg" alt="" class="icon-soft h-5 w-5 object-contain"/>
      </button>
      <img src="assets/icons/blackstar_logo.svg" alt="Black Star" class="main-logo"/>
      <button class="flex h-10 w-10 items-center justify-center rounded-full transition hover:bg-white/5">
        <img src="assets/icons/dots.svg" alt="More options" class="icon-soft h-5 w-5 object-contain"/>
      </button>
    </header>
    <section class="player-content px-4 pb-8">
      <div class="turntable mx-auto mt-2">
        <div class="record" [class.is-playing]="player.isPlaying()" [style.--cover-image]="'url(' + player.currentTrack().cover + ')'">
          <div class="record-label"></div>
          <div class="record-hole"></div>
        </div>
        <div class="tonearm" [class.is-playing]="player.isPlaying()">
          <div class="tonearm-base"></div>
          <div class="tonearm-line"></div>
          <div class="tonearm-head"></div>
        </div>
        <div class="turntable-button button-one">
          <img src="assets/icons/blackstarpng.png" alt="Black Star" class="turntable-logo-mark"/>
        </div>
        <div class="turntable-button button-two"></div>
      </div>
      <section class="px-2 pt-8">
        <div class="mb-6 flex min-w-0 items-start justify-between gap-4">
          <div class="min-w-0 flex-1">
            <h2 class="truncate text-[28px] font-light leading-tight text-white">
              {{ player.currentTrack().title }}
            </h2>
            <p class="mt-1 truncate text-base text-white/55">
              {{ player.currentTrack().artist }}
            </p>
          </div>
          <div class="flex shrink-0 gap-3 pt-2">
            <button type="button" (click)="player.toggleLike()" class="flex h-10 w-10 items-center justify-center rounded-full bg-white/[0.04] transition hover:bg-white/[0.08]" aria-label="Like track">
              <img [src]="player.isLiked() ? 'assets/icons/star_filled.svg' : 'assets/icons/star.svg'" alt="" class="player-like-icon"/>
            </button>
            <button type="button" (click)="options.openTrackOptions(player.currentTrack(), $event)" class="flex h-10 w-10 items-center justify-center">
              <img src="assets/icons/dots.svg" alt="Menu" class="icon-soft h-6 w-6 object-contain"/>
            </button>
          </div>
        </div>
        <button type="button" class="progress-bar mb-2" (click)="player.seekFromProgressClick($event)" aria-label="Seek track">
          <span class="progress-fill" [style.width.%]="player.progressPercent()">
            <span class="progress-thumb"></span>
          </span>
        </button>
        <div class="mb-3 flex justify-between text-xs text-white/45">
          <span>
            {{ player.positionLabel() }}
          </span>
          <span>
            {{ player.durationLabel() }}
          </span>
        </div>
        <section class="volume-control mb-8">
          <button type="button" class="volume-mute-btn" (click)="player.toggleMute()">
            {{ player.isMuted() ? 'MUTED' : 'VOL' }}
          </button>
          <input type="range" min="0" max="100" step="1" [value]="player.volumePercent()" [style.--volume-percent]="player.volumePercent() + '%'" (input)="player.setVolumeFromInput($event)" class="volume-slider" aria-label="Volume"/>
          <span class="volume-value">
            {{ player.volumePercent() }}%
          </span>
        </section>
        <div class="main-controls mb-8">
          <button type="button" class="main-side-btn" [class.is-active]="player.isShuffleEnabled()" (click)="player.toggleShuffle()" aria-label="Shuffle">
            <img src="assets/icons/mix.svg" alt="" class="h-5 w-5 object-contain" [class.icon-active]="player.isShuffleEnabled()" [class.icon-soft]="!player.isShuffleEnabled()"/>
          </button>
          <button type="button" (click)="player.previousTrack($event)" class="main-skip-btn" aria-label="Previous track">
            <img src="assets/icons/skip-previous.svg" alt="" class="icon-white main-skip-icon"/>
          </button>
          <button type="button" (click)="player.togglePlay($event)" class="main-play-btn" aria-label="Play or pause">
            <img [src]="player.isPlaying() ? 'assets/icons/pause.svg' : 'assets/icons/play-button.svg'" alt="" class="icon-white main-play-icon"/>
          </button>
          <button type="button" (click)="player.nextTrack($event)" class="main-skip-btn" aria-label="Next track">
            <img src="assets/icons/next.svg" alt=" class="icon-white main-skip-icon"/>
          </button>
          <button type="button" class="main-side-btn relative" [class.is-active]="player.repeatMode() !== 'off'" (click)="player.cycleRepeatMode()" aria-label="Repeat">
            <img src="assets/icons/loop.svg" alt="" class="h-5 w-5 object-contain" [class.icon-active]="player.repeatMode() !== 'off'" [class.icon-soft]="player.repeatMode() === 'off'"/>
            <span *ngIf="player.repeatMode() === 'track'" class="repeat-one-indicator">
              1
            </span>
          </button>
        </div>
        <section class="rounded-t-3xl border border-white/10 bg-white/[0.04] px-4 py-5">
          <div class="mb-5 grid grid-cols-2 text-center text-sm">
            <button class="relative pb-3 text-white">
              Queue
              <span class="absolute bottom-0 left-1/2 h-px w-10 -translate-x-1/2 bg-white"></span>
            </button>
            <button class="pb-3 text-white/40">
              Lyrics
            </button>
          </div>
          <div class="space-y-2">
            <app-track-list-item *ngFor="let track of player.queueTracks().length ? player.queueTracks() : browse.recentlyPlayedTracks()" [track]="track" variant="queue" [showOptions]="true" [queueContext]="player.queueTracks().length ? player.queueTracks() : browse.recentlyPlayedTracks()" [queueName]="player.queueName() || 'Queue'"></app-track-list-item>
          </div>
        </section>
      </section>
    </section>
  </div>
</section>
