<section class="create-playlist-overlay" (click)="player.closeCreatePlaylist()">
  <form class="create-playlist-sheet" (click)="$event.stopPropagation()" (submit)="onSubmit($event)">
    <div class="mx-auto mb-5 h-1 w-12 rounded-full bg-white/20"></div>
    <div class="mb-6">
      <p class="mb-2 text-[10px] uppercase tracking-[0.35em] text-white/30">
        Spotify
      </p>
      <h2 class="text-2xl font-light text-white">
        Create Playlist
      </h2>
      <p class="mt-2 text-sm leading-6 text-white/45">
        Create an empty Spotify playlist directly from BLACK STAR.
      </p>
    </div>
    <div class="space-y-4">
      <label class="block">
        <span class="mb-2 block text-xs text-white/45">
          Name
        </span>
        <input type="text" [value]="player.createPlaylistName()" (input)="onNameInput($event)" placeholder="My BLACK STAR Playlist" class="h-12 w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 text-sm text-white outline-none transition placeholder:text-white/30 focus:border-white/25"/>
      </label>
      <label class="block">
        <span class="mb-2 block text-xs text-white/45">
          Description
        </span>
        <textarea [value]="player.createPlaylistDescription()" (input)="onDescriptionInput($event)" placeholder="Optional description" rows="3" class="w-full resize-none rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none transition placeholder:text-white/30 focus:border-white/25"></textarea>
      </label>
      <button type="button" (click)="player.toggleCreatePlaylistVisibility()" class="flex w-full items-center justify-between rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-4 text-left transition hover:bg-white/[0.08]">
        <div>
          <p class="text-sm font-light text-white">
            {{ player.createPlaylistIsPublic() ? 'Public playlist' : 'Private playlist' }}
          </p>
          <p class="text-xs text-white/40">
            {{ player.createPlaylistIsPublic() ? 'Visible on your Spotify profile' : 'Only visible to you' }}
          </p>
        </div>
        <span class="relative h-6 w-11 rounded-full border border-white/10 transition" [class.bg-white]="player.createPlaylistIsPublic()" [class.bg-white-5]="!player.createPlaylistIsPublic()">
          <span class="absolute top-1/2 h-4 w-4 -translate-y-1/2 rounded-full transition" [class.left-6]="player.createPlaylistIsPublic()" [class.left-1]="!player.createPlaylistIsPublic()" [class.bg-black]="player.createPlaylistIsPublic()" [class.bg-white]="!player.createPlaylistIsPublic()"></span>
        </span>
      </button>
    </div>
    <button type="submit" class="mt-6 flex h-12 w-full items-center justify-center rounded-full bg-white text-sm font-medium text-black transition hover:scale-[1.02] disabled:cursor-not-allowed disabled:opacity-45" [disabled]="player.isCreatingPlaylist() || !player.createPlaylistName().trim()">
      {{ player.isCreatingPlaylist() ? 'Creating...' : 'Create Playlist' }}
    </button>
    <button type="button" (click)="player.closeCreatePlaylist()" class="mt-3 flex h-12 w-full items-center justify-center rounded-full border border-white/10 bg-white/[0.03] text-sm text-white/55 transition hover:bg-white/[0.07] hover:text-white">
      Cancel
    </button>
  </form>
</section>
